name: CI Workflow

permissions:
  issues: read
  contents: read
  actions: read
  pull-requests: read

on:
  workflow_dispatch:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop, main ]

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Run Checkstyle
        run: mvn --batch-mode checkstyle:check
  
  build:
    needs: checkstyle
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: infinity_tech_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Copy Maven settings
        run: |
          mkdir -p ~/.m2
          cp .github/settings.xml ~/.m2/settings.xml

      - name: Build with Maven
        run: mvn --batch-mode clean install -DskipTests -Dspring.profiles.active=dev --settings .github/settings.xml
        env:
          GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cart_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JASYPT_ENCRYPTOR_PASSWORD: ${{ secrets.JASYPT_ENCRYPTOR_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}

      - name: Build and Tag Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cart-service:${{ github.run_number }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/cart-service:${{ github.run_number }} ${{ secrets.DOCKERHUB_USERNAME }}/cart-service:latest

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cart-service:${{ github.run_number }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cart-service:latest


  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Run Unit Tests with H2
        run: mvn --batch-mode test -Dspring.profiles.active=test
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;MODE=PostgreSQL
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          JASYPT_ENCRYPTOR_PASSWORD: ${{ secrets.JASYPT_ENCRYPTOR_PASSWORD }}

  sast:
    needs: build
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: PhumlaniDev/reusable-workflows/.github/workflows/java-maven-sast.yml@main
    secrets: inherit

  docker:
    needs: build
    permissions:
      packages: write      # Required for pushing to ghcr.io
      actions: read
      contents: read
    uses: PhumlaniDev/reusable-workflows/.github/workflows/java-maven-docker.yml@main
    with:
      project_name: cart-service
    secrets: inherit

  sca:
    needs: docker
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: PhumlaniDev/reusable-workflows/.github/workflows/java-maven-sca.yml@main
    with:
      image_tag: ${{ needs.docker.outputs.image_tag }}
      project_name: cart-service
    secrets: inherit

  #  dast:
  #    needs: build
  #    name: Dynamic Application Security Testing (DAST)
  #    uses: PhumlaniDev/reusable-workflows/.github/workflows/dast.yml@main
  #    secrets:
  #      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  #      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
  #    with:
  #      image-tag: '${{ secrets.DOCKERHUB_USERNAME }}/infinity-auth-service:latest'

  notify:
    uses: PhumlaniDev/reusable-workflows/.github/workflows/discord-notify.yml@main
    needs:
      - build
      - checkstyle
      - sast
      - docker
      - sca
    if: always()
    with:
      status: >-
        ${{ (needs.build.result == 'success' && needs.checkstyle.result == 'success' && needs.docker.result == 'success' && needs.sast.result == 'success' && needs.sca.result == 'success') && 'success' || 'failure' }}
      title: "🚀 Workflow Run - Combined Status"
      description: |
        Build: `${{ needs.build.result }}`
        Checkstyle: `${{ needs.checkstyle.result }}`
        SAST: `${{ needs.sast.result }}`
        SCA: `${{ needs.sca.result }}`
        Commit: `${{ github.sha }}`
        [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
      color: >-
        ${{ (needs.build.result == 'success' && needs.checkstyle.result == 'success' && needs.docker.result == 'success' && needs.sast.result == 'success' && needs.sca.result == 'success') && '3066993' || '15158332' }}
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}